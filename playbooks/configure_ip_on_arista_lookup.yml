---
- name: Handle Nautobot IP/interface change event
  hosts: localhost
  gather_facts: false

  vars:
    nautobot_url: "{{ lookup('env', 'NAUTOBOT_URL') }}"
    nautobot_token: "{{ lookup('env', 'NAUTOBOT_TOKEN') }}"
    eda_event: "{{ ansible_eda.event | default({}) }}"

  tasks:
      
    - name: Dump raw EDA event var
      ansible.builtin.debug:
        var: ansible_eda.event
    - name: Dump raw EDA event
      ansible.builtin.debug:
        msg: "{{ eda_event }}"

    - name: Determine event type from payload fields
      ansible.builtin.set_fact:
        event_type: >-
          {%- if eda_event.host is defined and eda_event.ip_version is defined -%}
          ip_address
          {%- elif eda_event.device is defined and eda_event.name is defined and eda_event.enabled is defined -%}
          interface
          {%- else -%}
          unknown
          {%- endif -%}

    - name: Show parsed event info
      ansible.builtin.debug:
        msg:
          - "Event type: {{ event_type }}"
          - "Matched rule: {{ ansible_eda.rule | default('N/A') }}"

    - name: End play on unknown event type
      when: event_type == 'unknown'
      block:
        - name: Log unknown event
          ansible.builtin.debug:
            msg: "Unrecognized event structure - skipping"
        - name: Stop
          ansible.builtin.meta: end_play

    # ── Interface event path ──────────────────────────────────────────
    - name: Look up interface by device and name
      ansible.builtin.uri:
        url: "{{ nautobot_url }}/api/dcim/interfaces/?device_id={{ eda_event.device }}&name={{ eda_event.name | urlencode }}"
        method: GET
        headers:
          Authorization: "Token {{ nautobot_token }}"
          Accept: "application/json"
        validate_certs: false
      register: intf_lookup
      when: event_type == 'interface'

    - name: Extract interface ID
      ansible.builtin.set_fact:
        found_interface_id: "{{ intf_lookup.json.results[0].id }}"
        found_interface_name: "{{ intf_lookup.json.results[0].name }}"
      when:
        - event_type == 'interface'
        - intf_lookup.json.count | default(0) | int > 0

    - name: Look up IP addresses on this interface
      ansible.builtin.uri:
        url: "{{ nautobot_url }}/api/ipam/ip-addresses/?interfaces={{ found_interface_id }}"
        method: GET
        headers:
          Authorization: "Token {{ nautobot_token }}"
          Accept: "application/json"
        validate_certs: false
      register: ip_on_intf
      when: found_interface_id is defined

    - name: Set IP info from interface lookup
      ansible.builtin.set_fact:
        ip_address: "{{ ip_on_intf.json.results[0].host }}"
        mask_length: "{{ ip_on_intf.json.results[0].mask_length | string }}"
        ip_obj: "{{ ip_on_intf.json.results[0] }}"
      when:
        - ip_on_intf is not skipped
        - ip_on_intf.json.count | default(0) | int > 0

    - name: End play if interface has no IPs
      when:
        - event_type == 'interface'
        - ip_obj is not defined
      block:
        - name: Log no IP on interface
          ansible.builtin.debug:
            msg: "No IP addresses assigned to {{ eda_event.name }} - nothing to configure"
        - name: Stop
          ansible.builtin.meta: end_play

    # ── IP address event path ─────────────────────────────────────────
    - name: Set IP details from event
      ansible.builtin.set_fact:
        ip_address: "{{ eda_event.host }}"
        mask_length: "{{ eda_event.mask_length | string }}"
      when: event_type == 'ip_address'

    - name: Look up IP address in Nautobot
      ansible.builtin.set_fact:
        ip_results: >-
          {{ query(
            'networktocode.nautobot.lookup',
            'ip-addresses',
            api_endpoint=nautobot_url,
            token=nautobot_token,
            api_filter='address=' + ip_address + '/' + mask_length
          ) }}
      when:
        - event_type == 'ip_address'
        - ip_address | default('') != ''

    - name: Set IP object from direct lookup
      ansible.builtin.set_fact:
        ip_obj: "{{ ip_results[0].value }}"
      when:
        - ip_results is defined
        - ip_results | length > 0

    - name: Fail if no IP found
      ansible.builtin.fail:
        msg: "IP address {{ ip_address | default('?') }}/{{ mask_length | default('?') }} not found in Nautobot"
      when: ip_obj is not defined

    # ── Common path: resolve device from IP ───────────────────────────
    - name: Extract interface ID from IP object
      ansible.builtin.set_fact:
        resolved_interface_id: "{{ ip_obj.interfaces[0].id }}"
      when:
        - ip_obj.interfaces is defined
        - ip_obj.interfaces | length > 0
        - found_interface_id is not defined

    - name: Use already-found interface ID
      ansible.builtin.set_fact:
        resolved_interface_id: "{{ found_interface_id }}"
      when: found_interface_id is defined

    - name: Look up interface to get device
      ansible.builtin.set_fact:
        interface_results: >-
          {{ query(
            'networktocode.nautobot.lookup',
            'interfaces',
            api_endpoint=nautobot_url,
            token=nautobot_token,
            api_filter='id=' + resolved_interface_id
          ) }}
      when: resolved_interface_id is defined

    - name: Extract device info from interface
      ansible.builtin.set_fact:
        resolved_interface_name: "{{ interface_results[0].value.name }}"
        resolved_device_id: "{{ interface_results[0].value.device.id }}"
      when:
        - interface_results is defined
        - interface_results | length > 0
        - interface_results[0].value.device is defined

    - name: Look up device details
      ansible.builtin.set_fact:
        device_results: >-
          {{ query(
            'networktocode.nautobot.lookup',
            'devices',
            api_endpoint=nautobot_url,
            token=nautobot_token,
            api_filter='id=' + resolved_device_id
          ) }}
      when: resolved_device_id is defined

    - name: Extract device name
      ansible.builtin.set_fact:
        device_name: "{{ device_results[0].value.name }}"
        device_obj: "{{ device_results[0].value }}"
      when:
        - device_results is defined
        - device_results | length > 0

    - name: Build final interface name
      ansible.builtin.set_fact:
        final_interface_name: "{{ resolved_interface_name | default(found_interface_name | default('N/A')) }}"

    - name: Show final results
      ansible.builtin.debug:
        msg:
          - "Event Type: {{ event_type }}"
          - "IP Address: {{ ip_address }}/{{ mask_length }}"
          - "Device: {{ device_name | default('NOT ASSIGNED') }}"
          - "Interface: {{ final_interface_name }}"

    - name: Save results for downstream workflow nodes
      ansible.builtin.set_stats:
        data:
          nautobot_ip_address: "{{ ip_address }}"
          nautobot_mask_length: "{{ mask_length }}"
          nautobot_device_name: "{{ device_name | default('') }}"
          nautobot_interface_name: "{{ final_interface_name }}"
          nautobot_device_mgmt_ip: "{{ device_obj.primary_ip4.address | default('') | regex_replace('/.*', '') }}"
          nautobot_device_platform: "{{ device_obj.platform.name | default('') }}"
          nautobot_event_type: "{{ event_type }}"
